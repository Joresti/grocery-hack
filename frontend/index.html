<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>GroceryHack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --primary: #3D7B7B;
        --primary-light: rgba(61, 123, 123, 0.08);
        --primary-shadow: rgba(61, 123, 123, 0.15);
        --accent: #C9A84C;
        --accent-light: rgba(201, 168, 76, 0.12);
        --bg: #FAF9F6;
        --white: #FFFFFF;
        --text: #2D2D2D;
        --text-muted: #5A5A5A;
        --border: rgba(61, 123, 123, 0.12);
        --green-badge-bg: #E6F4EA;
        --green-badge-text: #1A7F37;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
